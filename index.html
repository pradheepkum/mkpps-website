<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top left,#1d4ed8 0%,transparent 45%),
        radial-gradient(circle at bottom right,#312e81 0%,transparent 45%),
        linear-gradient(135deg,#071427,#0d1b34,#111827);
    color:#fff;
    overflow:hidden;
}

.background{
    position:absolute;
    inset:0;
    overflow:hidden;
}

.background span{
    position:absolute;
    width:280px;
    height:280px;
    border-radius:50%;
    background:rgba(255,255,255,0.03);
    filter:blur(4px);
}

.background span:nth-child(1){
    top:-80px;
    left:-80px;
}

.background span:nth-child(2){
    bottom:-120px;
    right:-100px;
    width:380px;
    height:380px;
}

.card{
    position:relative;
    z-index:2;
    width:min(90%,700px);
    padding:60px 50px;
    text-align:center;

    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:24px;

    box-shadow:
        0 20px 60px rgba(0,0,0,.35);
}

.small{
    color:#7dd3fc;
    font-size:.9rem;
    letter-spacing:4px;
    text-transform:uppercase;
    margin-bottom:20px;
}

h1{
    font-size:3rem;
    margin-bottom:20px;
    font-weight:700;
}

p{
    color:#d6d9e2;
    font-size:1.1rem;
    line-height:1.8;
    margin-bottom:40px;
}

.divider{
    width:70px;
    height:4px;
    background:#3b82f6;
    margin:0 auto 35px;
    border-radius:10px;
}

.month{
    display:inline-block;
    padding:14px 32px;
    border-radius:40px;
    background:#2563eb;
    color:#fff;
    font-weight:600;
    letter-spacing:.5px;
    box-shadow:0 10px 30px rgba(37,99,235,.35);
}

.footer{
    margin-top:40px;
    color:#9ca3af;
    font-size:.9rem;
}

@media(max-width:700px){

    .card{
        padding:45px 28px;
    }

    h1{
        font-size:2.2rem;
    }

    p{
        font-size:1rem;
    }

}
</style>
</head>

<body>

<div class="background">
    <span></span>
    <span></span>
</div>

<div class="card">

    <div class="small">Website Update</div>

    <h1>🚧 Under Construction</h1>

    <div class="divider"></div>

    <p>
        We're currently redesigning and improving our website to provide a
        better experience.
        <br><br>
        <strong>We'll be back in approximately one month.</strong>
    </p>

    <div class="month">
        See you soon!
    </div>

    <div class="footer">
        Thank you for your patience and continued support.
    </div>

</div>

</body>
</html>
