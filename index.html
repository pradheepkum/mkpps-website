<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MKPPS Consulting — Coming Soon</title>
<meta name="description" content="MKPPS Consulting's website is being redesigned. We'll be back soon with a brand new experience." />
<link rel="icon" type="image/png" href="./assets/img/favicon.png" />

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top left,#1d4ed8 0%,transparent 45%),
        radial-gradient(circle at bottom right,#312e81 0%,transparent 45%),
        linear-gradient(135deg,#071427,#0d1b34,#111827);
    color:#fff;
    overflow:hidden;
    padding:20px;
}

.background{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
}

.background span{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.035);
    filter:blur(6px);
    animation:pulse 8s ease-in-out infinite;
}

.background span:nth-child(1){
    top:-100px;
    left:-100px;
    width:320px;
    height:320px;
}

.background span:nth-child(2){
    bottom:-140px;
    right:-110px;
    width:420px;
    height:420px;
    animation-delay:-4s;
}

@keyframes pulse{
    0%,100%{ transform:scale(1); opacity:.6; }
    50%{ transform:scale(1.08); opacity:1; }
}

.card{
    position:relative;
    z-index:2;
    width:min(90%,700px);
    padding:60px 50px;
    text-align:center;

    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:24px;

    box-shadow:
        0 20px 60px rgba(0,0,0,.35);

    animation:rise .7s cubic-bezier(.16,1,.3,1) both;
}

@keyframes rise{
    from{ opacity:0; transform:translateY(18px); }
    to{ opacity:1; transform:translateY(0); }
}

.badge{
    width:64px;
    height:64px;
    margin:0 auto 24px;
    border-radius:16px;
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:11px;
    box-shadow:0 10px 25px rgba(37,99,235,.4);
}

.badge img{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
}

.small{
    color:#7dd3fc;
    font-size:.85rem;
    letter-spacing:4px;
    text-transform:uppercase;
    margin-bottom:16px;
}

h1{
    font-size:2.6rem;
    font-weight:700;
    letter-spacing:-.5px;
}

.tagline{
    font-size:1.15rem;
    font-weight:500;
    color:#93c5fd;
    margin-bottom:20px;
    margin-top:6px;
}

p.description{
    color:#d6d9e2;
    font-size:1.05rem;
    line-height:1.8;
    margin-bottom:40px;
}

.divider{
    width:70px;
    height:4px;
    background:#3b82f6;
    margin:24px auto 35px;
    border-radius:10px;
}

.month{
    display:inline-block;
    padding:14px 32px;
    border-radius:40px;
    background:#2563eb;
    color:#fff;
    font-weight:600;
    letter-spacing:.5px;
    box-shadow:0 10px 30px rgba(37,99,235,.35);
}

.footer{
    margin-top:40px;
    color:#9ca3af;
    font-size:.9rem;
}

@media(max-width:700px){

    .card{
        padding:45px 28px;
    }

    h1{
        font-size:2rem;
    }

    .tagline{
        font-size:1rem;
    }

    p.description{
        font-size:1rem;
    }

}
</style>
</head>

<body>

<div class="background">
    <span></span>
    <span></span>
</div>

<div class="card">

    <div class="badge">
        <img src="./assets/img/favicon.png" alt="MKPPS Consulting logo" />
    </div>

    <div class="small">Website Update</div>

    <h1>MKPPS Consulting</h1>
    <div class="tagline">Coming Soon</div>

    <div class="divider"></div>

    <p class="description">
        We're currently redesigning and improving our website to provide a
        better experience.
        <br><br>
        <strong>We'll be back in approximately one month.</strong>
    </p>

    <div class="month">
        See you soon!
    </div>

    <div class="footer">
        Thank you for your patience and continued support.
    </div>

</div>

</body>
</html>
